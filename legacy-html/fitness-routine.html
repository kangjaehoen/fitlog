<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog - 루틴 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            padding-bottom: 180px; /* 하단 고정 버튼과 탭바 공간 확보 */
        }
        .routine-card {
            transition: all 0.2s ease;
        }
        .routine-card:active {
            transform: scale(0.98);
        }
        /* 하단 고정 영역 설정 */
        .fixed-bottom-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            max-width: 448px; /* max-w-md와 동일 */
            margin: 0 auto;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header class="p-5 bg-white sticky top-0 z-30 shadow-sm flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-800">루틴</h1>
        <div class="flex gap-2">
            <button class="p-2 text-slate-400">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
            </button>
            <button class="p-2 text-slate-400">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- 검색창 (필요 시 노출) -->
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" placeholder="루틴 이름 검색" class="w-full bg-white border border-slate-200 rounded-2xl py-3.5 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
        </div>

        <!-- 내 루틴 리스트 -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">나의 활성 루틴 (3)</h2>
                <button class="text-[11px] font-bold text-indigo-600 hover:text-indigo-800">편집</button>
            </div>

            <!-- 루틴 아이템 1 -->
            <div class="routine-card bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-5">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-slate-800 text-lg">상체 벌크업 A</h3>
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded-full">주 3회</span>
                        </div>
                        <p class="text-xs text-slate-400">가슴, 어깨, 삼두 위주 집중 루틴</p>
                    </div>
                    <button class="text-slate-300 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
                
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-indigo-500 shadow-sm">
                            <i class="fa-solid fa-dumbbell text-xs"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-600">6개 운동 구성</span>
                    </div>
                    <span class="text-xs font-medium text-slate-400">약 65분 소모</span>
                </div>

                <button class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold text-sm shadow-lg shadow-slate-200 active:scale-[0.98] transition-transform">
                    이 루틴으로 시작하기
                </button>
            </div>

            <!-- 루틴 아이템 2 -->
            <div class="routine-card bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-5">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-slate-800 text-lg">하체 및 코어 데이</h3>
                            <span class="bg-emerald-50 text-emerald-600 text-[10px] font-bold px-2 py-0.5 rounded-full">주 2회</span>
                        </div>
                        <p class="text-xs text-slate-400">스쿼트 중심의 하체 근력 강화</p>
                    </div>
                    <button class="text-slate-300 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
                
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-emerald-500 shadow-sm">
                            <i class="fa-solid fa-bolt text-xs"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-600">5개 운동 구성</span>
                    </div>
                    <span class="text-xs font-medium text-slate-400">약 50분 소모</span>
                </div>

                <button class="w-full py-4 bg-slate-100 text-slate-700 rounded-2xl font-bold text-sm active:scale-[0.98] transition-transform">
                    이 루틴으로 시작하기
                </button>
            </div>

            <!-- 루틴 아이템 3 (목록 길이를 위한 예시) -->
            <div class="routine-card bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-5 opacity-60">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-slate-800 text-lg">주말 유산소</h3>
                            <span class="bg-orange-50 text-orange-600 text-[10px] font-bold px-2 py-0.5 rounded-full">주 1회</span>
                        </div>
                        <p class="text-xs text-slate-400">지구력 강화 및 칼로리 소모</p>
                    </div>
                </div>
                <button class="w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold text-sm cursor-not-allowed">
                    이 루틴으로 시작하기
                </button>
            </div>
        </section>

    </main>

    <!-- 하단 고정 영역 (버튼 + 탭바) -->
    <div class="fixed-bottom-container">
        <!-- 맞춤형 루틴 만들기 버튼: 탭바 바로 위에 고정 -->
        <div class="px-4 pb-4">
            <button class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-sm shadow-[0_8px_25px_rgba(79,70,229,0.3)] flex items-center justify-center gap-2 active:scale-[0.97] transition-all border border-indigo-500/20">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>맞춤형 루틴 만들기</span>
            </button>
        </div>

        <!-- 하단 탭바 -->
        <nav class="bg-white/90 backdrop-blur-xl border-t border-slate-100 h-[75px] flex items-center justify-around px-2 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
            <button class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-500 transition-colors">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium">홈</span>
            </button>
            <button class="flex flex-col items-center gap-1.5 text-indigo-600">
                <i class="fa-solid fa-list-check text-lg"></i>
                <span class="text-[10px] font-bold">루틴</span>
            </button>
            <button class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-500 transition-colors">
                <i class="fa-solid fa-chart-simple text-lg"></i>
                <span class="text-[10px] font-medium">통계</span>
            </button>
            <button class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-500 transition-colors">
                <i class="fa-solid fa-user text-lg"></i>
                <span class="text-[10px] font-medium">마이</span>
            </button>
        </nav>
    </div>

</body>
</html>
