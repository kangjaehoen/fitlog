<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff; /* 스플래시 배경에 맞춰 변경 가능 */
        }

        /* 버튼 클릭 시 눌리는 효과 */
        .btn-press:active {
            transform: scale(0.98);
            opacity: 0.9;
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- [Component Start] 소셜 로그인 세로형 버튼 세트 -->
    <div class="w-full max-w-[340px] space-y-3">
        
        <!-- 카카오 로그인 -->
        <button class="btn-press w-full h-[56px] bg-[#FEE500] rounded-[14px] flex items-center justify-center gap-2.5 text-[16px] font-bold text-[#191919]">
            <!-- 카카오 아이콘 (FontAwesome 활용) -->
            <i class="fa-solid fa-comment text-[20px]"></i>
            카카오로 시작하기
        </button>

        <!-- 구글 로그인 -->
        <button class="btn-press w-full h-[56px] bg-white rounded-[14px] border border-[#E2E8F0] flex items-center justify-center gap-2.5 text-[16px] font-bold text-[#3c4043] shadow-sm">
            <!-- Google 로고 SVG -->
            <svg class="w-5 h-5" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Google로 시작하기
        </button>

        <!-- 애플 로그인 -->
        <button class="btn-press w-full h-[56px] bg-black rounded-[14px] flex items-center justify-center gap-2.5 text-[16px] font-bold text-white">
            <!-- 애플 아이콘 -->
            <i class="fa-brands fa-apple text-[22px] mb-0.5"></i>
            Apple로 시작하기
        </button>

    </div>
    <!-- [Component End] -->

</body>
</html>
