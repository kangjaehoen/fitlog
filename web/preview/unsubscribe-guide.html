<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서비스 탈퇴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 상단부터 배치 */
        }

        .mobile-container {
            width: 100%;
            max-width: 450px;
            /* 고정된 높이 대신 내용에 맞게 조절되도록 설정 */
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* 체크박스 커스텀 디자인 */
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .btn-transition {
            transition: all 0.2s ease;
        }
        .btn-transition:active {
            transform: scale(0.96);
        }

        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <!-- 상단 헤더 -->
        <header class="flex items-center px-4 h-14 border-b bg-white sticky top-0 z-10">
            <button class="p-2 -ml-2" onclick="history.back()">
                <i class="fa-solid fa-chevron-left text-lg text-slate-600"></i>
            </button>
            <h1 class="flex-1 text-center font-bold text-lg mr-8">서비스 탈퇴</h1>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main class="px-6 pt-8 pb-10">
            
            <!-- 안내 박스 -->
            <div class="bg-slate-50 rounded-2xl p-5 mb-6 border border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-[15px]">
                    <i class="fa-solid fa-circle-info text-blue-500 text-sm"></i>
                    탈퇴 시 유의사항
                </h3>
                <ul class="space-y-4">
                    <li class="flex gap-3">
                        <span class="text-slate-400 mt-1"><i class="fa-solid fa-circle-check text-[10px]"></i></span>
                        <p class="text-[14px] text-slate-600 leading-relaxed">
                            계정 정보 및 <strong>개인 프로필 데이터</strong>가 모두 삭제되며 복구할 수 없습니다.
                        </p>
                    </li>
                    <li class="flex gap-3">
                        <span class="text-slate-400 mt-1"><i class="fa-solid fa-circle-check text-[10px]"></i></span>
                        <p class="text-[14px] text-slate-600 leading-relaxed">
                            현재 보유 중인 <strong>잔여 포인트 및 쿠폰</strong>은 모두 소멸되며 재가입 시에도 복구되지 않습니다.
                        </p>
                    </li>
                    <li class="flex gap-3">
                        <span class="text-slate-400 mt-1"><i class="fa-solid fa-circle-check text-[10px]"></i></span>
                        <p class="text-[14px] text-slate-600 leading-relaxed">
                            작성하신 게시물이나 리뷰는 삭제되지 않을 수 있으니, <strong>탈퇴 전 직접 삭제</strong>해 주시기 바랍니다.
                        </p>
                    </li>
                    <li class="flex gap-3">
                        <span class="text-slate-400 mt-1"><i class="fa-solid fa-circle-check text-[10px]"></i></span>
                        <p class="text-[14px] text-slate-600 leading-relaxed">
                            진행 중인 주문 또는 구독 서비스가 있는 경우 탈퇴가 제한될 수 있습니다.
                        </p>
                    </li>
                </ul>
            </div>

            <!-- 동의 체크 섹션 -->
            <label class="flex items-center gap-3 p-4 bg-white border-2 border-slate-100 rounded-2xl cursor-pointer hover:border-blue-100 transition-colors mb-8">
                <input type="checkbox" id="agree-check">
                <span class="text-[14px] font-medium text-slate-700 select-none">
                    안내 내용을 모두 확인하였으며, 탈퇴에 동의합니다.
                </span>
            </label>

            <!-- 버튼 영역 -->
            <div class="flex flex-col gap-3">
                <button class="btn-transition w-full h-14 bg-[#101828] text-white rounded-2xl font-bold text-[16px] shadow-lg shadow-slate-200">
                    계속 이용하기
                </button>
                <button id="withdraw-btn" class="btn-transition w-full h-12 bg-transparent text-slate-400 rounded-2xl font-medium text-[14px] hover:text-red-500 hover:bg-red-50">
                    탈퇴하기
                </button>
            </div>
        </main>
    </div>

    <!-- 모달 UI -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center p-6">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 overflow-hidden">
            <h4 id="modal-title" class="text-lg font-bold text-slate-900 mb-2">알림</h4>
            <p id="modal-message" class="text-slate-600 mb-6 text-sm"></p>
            <div class="flex gap-2">
                <button id="modal-cancel" class="flex-1 h-12 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hidden">취소</button>
                <button id="modal-confirm" class="flex-1 h-12 bg-[#101828] text-white rounded-xl font-bold text-sm">확인</button>
            </div>
        </div>
    </div>

    <script>
        const agreeCheck = document.getElementById('agree-check');
        const withdrawBtn = document.getElementById('withdraw-btn');
        const overlay = document.getElementById('modal-overlay');
        const modalMessage = document.getElementById('modal-message');
        const modalConfirm = document.getElementById('modal-confirm');
        const modalCancel = document.getElementById('modal-cancel');

        function showModal(msg, showCancel = false, onConfirm = null) {
            modalMessage.textContent = msg;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            if(showCancel) {
                modalCancel.classList.remove('hidden');
            } else {
                modalCancel.classList.add('hidden');
            }

            modalConfirm.onclick = () => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                if(onConfirm) onConfirm();
            };

            modalCancel.onclick = () => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            };
        }

        withdrawBtn.addEventListener('click', () => {
            if (!agreeCheck.checked) {
                showModal('탈퇴 동의 체크박스에 체크해 주세요.');
            } else {
                showModal('정말로 탈퇴하시겠습니까? 모든 정보가 사라집니다.', true, () => {
                    showModal('탈퇴 처리가 완료되었습니다.');
                });
            }
        });

        document.querySelector('.bg-[#101828]').addEventListener('click', () => {
            showModal('계속 서비스를 이용해 주셔서 감사합니다!');
        });
    </script>
</body>
</html>
