<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog - 마이 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            padding-bottom: 100px;
        }
        .profile-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }
        .menu-item {
            transition: all 0.2s ease;
        }
        .menu-item:active {
            background-color: #f1f5f9;
        }
        /* 그래프 애니메이션 */
        .path-anim {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 2s ease-in-out forwards;
        }
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
        .dot-anim {
            animation: fadeIn 0.5s ease-in forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 헤더 영역 (프로필 요약) -->
    <header class="profile-gradient px-5 pt-6 pb-10 text-white relative">
        <div class="max-w-md mx-auto relative">
        <div class="flex justify-end items-start mb-5">
            <!-- '마이 페이지' 문구 삭제됨 -->
            <button class="w-10 h-10 bg-white/20 rounded-full backdrop-blur-sm active:scale-95 transition-transform flex items-center justify-center">
                <i class="fa-solid fa-gear text-sm"></i>
            </button>
        </div>
        
        <div class="flex items-start gap-4 pr-2">
            <div class="relative">
                <div class="w-16 h-16 rounded-[24px] bg-white/30 border-2 border-white/50 flex items-center justify-center overflow-hidden">
                    <i class="fa-solid fa-user text-3xl text-white"></i>
                </div>
                <button class="absolute -bottom-1 -right-1 w-7 h-7 bg-white text-indigo-600 rounded-full flex items-center justify-center shadow-lg text-[10px]">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            <div class="space-y-1 pt-1 min-w-0">
                <div class="flex items-center gap-2">
                    <h2 id="profileDisplayName" class="text-2xl font-black">김운동님</h2>
                    <button type="button" id="openProfileEdit" class="w-8 h-8 shrink-0 rounded-full bg-white/20 backdrop-blur-sm hover:bg-white/30 active:scale-95 transition-all flex items-center justify-center text-white/90 hover:text-white" aria-label="프로필 수정">
                        <i class="fa-solid fa-pen text-[11px]"></i>
                    </button>
                </div>
                <p class="mb-4 text-white/70 text-xs font-medium">운동 시작한 지 <span class="text-white font-bold">124일</span>째</p>
            </div>
        </div>

        <!-- 성과 요약 카드 -->
        <div class="absolute -bottom-20 inset-x-4 bg-white rounded-3xl px-4 py-4 shadow-xl shadow-indigo-100 border border-slate-50 grid grid-cols-3">
            <div class="text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">이번 달 운동</p>
                <p class="text-lg font-black text-slate-800">18회</p>
            </div>
            <div class="text-center border-x border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">총 운동 시간</p>
                <p class="text-lg font-black text-slate-800">86h</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">누적 볼륨</p>
                <p class="text-lg font-black text-slate-800">42.5t</p>
            </div>
        </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5 mt-16 space-y-6">

        <!-- 목표 진행률 -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-800 text-sm">목표 달성 현황</h3>
                <span class="text-[11px] font-bold text-indigo-600">80% 달성</span>
            </div>
            <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full bg-indigo-500 rounded-full" style="width: 80%"></div>
            </div>
            <p class="text-[11px] text-slate-400 mt-3">이번 달 목표인 '주 4회 운동'까지 단 <span class="text-slate-800 font-bold">2회</span> 남았습니다!</p>
        </section>

        <!-- 신체 지표 섹션 -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-wider">신체 지표 변화</h3>
                <span class="text-[10px] text-slate-300 font-medium tracking-tight">최근 5회 기록</span>
            </div>

            <!-- 그래프 및 상세 수치 컨테이너 -->
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-8">
                
                <!-- 몸무게 꺾은선 그래프 (SVG 구현) -->
                <div class="relative w-full">
                    <div class="flex justify-between items-center mb-6">
                        <!-- Weight Chart 대신 몸무게로 표시 -->
                        <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">몸무게</span>
                    </div>
                    
                    <div class="h-32 w-full relative">
                        <!-- 배경 가이드라인 -->
                        <div class="absolute inset-0 flex flex-col justify-between opacity-50">
                            <div class="border-t border-slate-50 w-full"></div>
                            <div class="border-t border-slate-50 w-full"></div>
                            <div class="border-t border-slate-50 w-full"></div>
                        </div>

                        <!-- 그래프 SVG -->
                        <svg class="w-full h-full overflow-visible" viewBox="0 0 400 100">
                            <!-- 선 -->
                            <path d="M 0,80 L 100,75 L 200,85 L 300,70 L 400,60" 
                                  fill="none" 
                                  stroke="#4f46e5" 
                                  stroke-width="3" 
                                  stroke-linecap="round" 
                                  stroke-linejoin="round"
                                  class="path-anim" />
                            
                            <!-- 데이터 점들 -->
                            <circle cx="0" cy="80" r="4" fill="white" stroke="#4f46e5" stroke-width="2" class="dot-anim" style="animation-delay: 0.2s" />
                            <circle cx="100" cy="75" r="4" fill="white" stroke="#4f46e5" stroke-width="2" class="dot-anim" style="animation-delay: 0.4s" />
                            <circle cx="200" cy="85" r="4" fill="white" stroke="#4f46e5" stroke-width="2" class="dot-anim" style="animation-delay: 0.6s" />
                            <circle cx="300" cy="70" r="4" fill="white" stroke="#4f46e5" stroke-width="2" class="dot-anim" style="animation-delay: 0.8s" />
                            <circle cx="400" cy="60" r="5" fill="#4f46e5" class="dot-anim" style="animation-delay: 1s" />
                        </svg>

                        <!-- 현재 수치 툴팁 -->
                        <div class="absolute top-2 right-0 -translate-y-full translate-x-2 bg-indigo-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold shadow-lg shadow-indigo-100">
                            74.2kg
                        </div>
                    </div>

                    <!-- X축 날짜 레이블 -->
                    <div class="flex justify-between mt-4 px-1">
                        <span class="text-[9px] font-bold text-slate-300">03.20</span>
                        <span class="text-[9px] font-bold text-slate-300">03.25</span>
                        <span class="text-[9px] font-bold text-slate-300">04.01</span>
                        <span class="text-[9px] font-bold text-slate-300">04.05</span>
                        <span class="text-[9px] font-black text-indigo-600">오늘</span>
                    </div>
                </div>

                <!-- 수치 선택 버튼 그룹 (몸무게 강조) -->
                <div class="grid grid-cols-3 gap-2 pt-2">
                    <!-- 몸무게 (선택됨) -->
                    <button class="flex flex-col items-center p-3 rounded-2xl bg-indigo-600 text-white shadow-xl shadow-indigo-100 ring-4 ring-indigo-50 border border-indigo-400/20">
                        <span class="text-[9px] font-bold text-white mb-1">몸무게</span>
                        <span class="text-sm font-black italic">74.2 <span class="text-[8px] font-normal not-italic">kg</span></span>
                        <span class="text-[9px] font-bold mt-1.5 flex items-center gap-0.5"><i class="fa-solid fa-caret-down"></i> 0.4</span>
                    </button>
                    <!-- 골격근량 -->
                    <button class="flex flex-col items-center p-3 rounded-2xl bg-white border border-slate-100 text-slate-400 active:bg-slate-50">
                        <span class="text-[9px] font-bold text-slate-400 mb-1">골격근량</span>
                        <span class="text-sm font-black text-slate-800">36.5 <span class="text-[8px] font-normal">kg</span></span>
                        <span class="text-[9px] font-bold text-emerald-500 mt-1.5 flex items-center gap-0.5"><i class="fa-solid fa-caret-up"></i> 0.2</span>
                    </button>
                    <!-- 체지방률 -->
                    <button class="flex flex-col items-center p-3 rounded-2xl bg-white border border-slate-100 text-slate-400 active:bg-slate-50">
                        <span class="text-[9px] font-bold text-slate-400 mb-1">체지방률</span>
                        <span class="text-sm font-black text-slate-800">16.8 <span class="text-[8px] font-normal">%</span></span>
                        <span class="text-[9px] font-bold text-rose-500 mt-1.5 flex items-center gap-0.5"><i class="fa-solid fa-caret-down"></i> 1.2</span>
                    </button>
                </div>

                <!-- 기록 추가 버튼 -->
                <button class="w-full py-4 bg-slate-900 text-white rounded-2xl text-sm font-bold hover:bg-slate-800 active:scale-[0.98] transition-all flex items-center justify-center gap-3 shadow-lg shadow-slate-200">
                    <i class="fa-solid fa-plus text-xs text-white"></i>
                    <span class="text-white">
                    새로운 신체 데이터 기록
                    </span>
                </button>
            </div>
        </section>

        <!-- 서비스 설정 메뉴 -->
        <section class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100">
            <div class="px-5 py-4 border-b border-slate-50 bg-slate-50/50">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-wider">서비스 설정</h3>
            </div>
            <div class="divide-y divide-slate-50">
                <button class="w-full px-5 py-4 flex items-center justify-between menu-item">
                    <div class="flex items-center gap-4">
                        <div class="w-9 h-9 rounded-xl bg-slate-50 text-slate-500 flex items-center justify-center">
                            <i class="fa-solid fa-bell text-sm"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-700">알림 설정</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-indigo-500 font-bold">ON</span>
                        <i class="fa-solid fa-chevron-right text-xs text-slate-300"></i>
                    </div>
                </button>
                <button class="w-full px-5 py-4 flex items-center justify-between menu-item">
                    <div class="flex items-center gap-4">
                        <div class="w-9 h-9 rounded-xl bg-slate-50 text-slate-500 flex items-center justify-center">
                            <i class="fa-solid fa-circle-question text-sm"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-700">자주 묻는 질문</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs text-slate-300"></i>
                </button>
            </div>
        </section>

    </main>

    <!-- 프로필 수정 모달 -->
    <div id="profileEditModal" class="fixed inset-0 z-[100] hidden items-end sm:items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="profileEditTitle">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden animate-[fadeIn_0.2s_ease-out]">
            <div class="px-6 pt-6 pb-4 border-b border-slate-100 flex justify-between items-center">
                <h3 id="profileEditTitle" class="text-lg font-black text-slate-800">프로필 수정</h3>
                <button type="button" id="closeProfileEdit" class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center hover:bg-slate-200" aria-label="닫기">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="profileEditForm" class="p-6 space-y-5">
                <div>
                    <label for="profileNickname" class="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-2">닉네임</label>
                    <input type="text" id="profileNickname" name="nickname" maxlength="20" required class="w-full px-4 py-3 rounded-2xl border border-slate-200 text-slate-800 font-bold focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="닉네임을 입력하세요" autocomplete="nickname">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="cancelProfileEdit" class="flex-1 py-3.5 rounded-2xl border border-slate-200 text-sm font-bold text-slate-600 hover:bg-slate-50">취소</button>
                    <button type="submit" class="flex-1 py-3.5 rounded-2xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200">저장</button>
                </div>
            </form>
        </div>
    </div>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #profileEditModal:not(.hidden) {
            display: flex;
        }
    </style>
    <script>
        (function () {
            var modal = document.getElementById('profileEditModal');
            var openBtn = document.getElementById('openProfileEdit');
            var closeBtn = document.getElementById('closeProfileEdit');
            var cancelBtn = document.getElementById('cancelProfileEdit');
            var form = document.getElementById('profileEditForm');
            var nicknameInput = document.getElementById('profileNickname');
            var displayName = document.getElementById('profileDisplayName');

            function stripSuffix(name) {
                return name.replace(/님$/, '');
            }
            function openModal() {
                nicknameInput.value = stripSuffix(displayName.textContent.trim());
                modal.classList.remove('hidden');
                nicknameInput.focus();
            }
            function closeModal() {
                modal.classList.add('hidden');
            }
            openBtn.addEventListener('click', openModal);
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function (e) {
                if (e.target === modal) closeModal();
            });
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var raw = (nicknameInput.value || '').trim();
                if (!raw) return;
                displayName.textContent = raw + '님';
                closeModal();
            });
        })();
    </script>

    <!-- 하단 탭바 -->
    <nav class="bottom-nav-fixed bg-white/80 backdrop-blur-lg border-t border-slate-100 h-[75px] flex items-center justify-around px-2 max-w-md mx-auto">
        <button class="flex flex-col items-center gap-1.5 text-slate-400">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] font-medium">홈</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-400">
            <i class="fa-solid fa-chart-simple text-lg"></i>
            <span class="text-[10px] font-medium">기록 분석</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-400">
            <i class="fa-solid fa-list-check text-lg"></i>
            <span class="text-[10px] font-medium">루틴</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-indigo-600">
            <i class="fa-solid fa-user text-lg"></i>
            <span class="text-[10px] font-bold">마이</span>
        </button>
    </nav>

</body>
</html>
