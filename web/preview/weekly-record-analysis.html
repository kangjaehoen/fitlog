<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitLog Weekly Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-inner topbar-stack">
          <div class="section-header-inline">
            <div>
              <p class="eyebrow">Weekly Review</p>
              <h1 class="title">통계</h1>
            </div>
            <button class="icon-button" type="button" aria-label="공유">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="2"></circle>
                <circle cx="6" cy="12" r="2"></circle>
                <circle cx="18" cy="19" r="2"></circle>
                <path d="m8 11 8-5"></path>
                <path d="m8 13 8 5"></path>
              </svg>
            </button>
          </div>

          <div class="week-switcher">
            <div class="week-switcher-inner">
              <button class="icon-button" type="button" aria-label="이전 주">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m15 18-6-6 6-6"></path>
                </svg>
              </button>
              <div class="week-label">
                <p class="week-title">4월 1주차</p>
                <p class="pill pill-indigo">4월 1일 월요일 ~ 4월 7일 일요일</p>
              </div>
              <button class="icon-button" type="button" aria-label="다음 주" style="opacity: 0.5">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m9 18 6-6-6-6"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="page">
        <section class="card card-pad">
          <div class="chart-card-header">
            <div>
              <h2>주간 운동 시간</h2>
              <p class="subtle" style="font-size: 14px">총 5시간 42분 운동했어요.</p>
            </div>
            <span class="pill pill-indigo">지난주 대비 +15%</span>
          </div>

          <div class="bar-chart">
            <div class="bar-group"><div class="bar" style="height: 45%"></div><div class="bar-label">월</div></div>
            <div class="bar-group"><div class="bar" style="height: 70%"></div><div class="bar-label">화</div></div>
            <div class="bar-group"><div class="bar" style="height: 30%"></div><div class="bar-label">수</div></div>
            <div class="bar-group"><div class="bar active" style="height: 85%"></div><div class="bar-label active">목</div></div>
            <div class="bar-group"><div class="bar" style="height: 60%"></div><div class="bar-label">금</div></div>
            <div class="bar-group"><div class="bar" style="height: 25%"></div><div class="bar-label">토</div></div>
            <div class="bar-group"><div class="bar" style="height: 10%"></div><div class="bar-label">일</div></div>
          </div>

          <div class="kpis">
            <article class="kpi">
              <div class="label">성공한 세션</div>
              <div class="value">12회</div>
            </article>
            <article class="kpi">
              <div class="label">주간 소모 칼로리</div>
              <div class="value text-orange">2,480 kcal</div>
            </article>
          </div>
        </section>

        <section class="card card-pad">
          <h2 style="margin: 0">주간 영양 성분 비율</h2>

          <div class="macro-layout">
            <div class="donut">
              <div class="donut-center">
                <p class="subtle">상태</p>
                <p style="margin: 2px 0 0; font-size: 13px; font-weight: 900">안정</p>
              </div>
            </div>

            <div class="macro-list">
              <div class="macro-row">
                <span class="macro-label"><span class="macro-dot" style="background: #4f46e5"></span>단백질</span>
                <strong>42%</strong>
              </div>
              <div class="macro-row">
                <span class="macro-label"><span class="macro-dot" style="background: #60a5fa"></span>탄수화물</span>
                <strong>38%</strong>
              </div>
              <div class="macro-row">
                <span class="macro-label"><span class="macro-dot" style="background: #f59e0b"></span>지방</span>
                <strong>20%</strong>
              </div>
            </div>
          </div>

          <div class="insight">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="m12 3 1.1 3.4L16.5 7.5l-3.4 1.1L12 12l-1.1-3.4L7.5 7.5l3.4-1.1L12 3Z"></path>
              <path d="m18 13 .6 1.8 1.9.6-1.9.6L18 18l-.6-1.9-1.9-.6 1.9-.6L18 13Z"></path>
              <path d="m6 14 .8 2.2L9 17l-2.2.8L6 20l-.8-2.2L3 17l2.2-.8L6 14Z"></path>
            </svg>
            <div>
              <strong>AI 분석:</strong>
              이번 주 단백질 섭취량이 매우 좋습니다. 주말에는 탄수화물 비율만
              조금 더 올려보세요.
            </div>
          </div>
        </section>

        <section class="card card-pad">
          <div class="weight-header">
            <h2>체중 트렌드</h2>
            <span class="pill pill-indigo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 20h16"></path>
                <path d="M7 16V9"></path>
                <path d="M12 16V5"></path>
                <path d="M17 16v-3"></path>
              </svg>
              최근 30일
            </span>
          </div>

          <div class="weight-card">
            <div class="weight-chart">
              <div class="weight-bar" style="height: 64%"></div>
              <div class="weight-bar" style="height: 55%"></div>
              <div class="weight-bar" style="height: 58%"></div>
              <div class="weight-bar" style="height: 46%"></div>
              <div class="weight-bar active" style="height: 38%"></div>
              <div class="weight-bar active" style="height: 31%"></div>
              <div class="weight-bar active" style="height: 25%"></div>
            </div>

            <div class="weight-stats">
              <div class="weight-stat">
                <div class="label">시작</div>
                <div class="value">73.5kg</div>
              </div>
              <div class="weight-stat">
                <div class="label">현재</div>
                <div class="value">71.2kg</div>
              </div>
              <div class="weight-stat">
                <div class="label">감량</div>
                <div class="value" style="color: #4f46e5">-2.3kg</div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav class="bottom-nav">
        <div class="bottom-nav-inner">
          <a class="nav-link" href="./home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="m3 10.5 9-7 9 7"></path>
              <path d="M5 9.5V20h14V9.5"></path>
              <path d="M10 20v-5h4v5"></path>
            </svg>
            홈
          </a>
          <a class="nav-link" href="./home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 6h12"></path>
              <path d="M8 12h12"></path>
              <path d="M8 18h12"></path>
              <path d="M4 6h.01"></path>
              <path d="M4 12h.01"></path>
              <path d="M4 18h.01"></path>
            </svg>
            루틴
          </a>
          <a class="nav-link active" href="./weekly-record-analysis.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 20h16"></path>
              <path d="M7 16V9"></path>
              <path d="M12 16V5"></path>
              <path d="M17 16v-3"></path>
            </svg>
            통계
          </a>
          <a class="nav-link" href="./home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
              <path d="M5.5 20a6.5 6.5 0 0 1 13 0"></path>
            </svg>
            마이
          </a>
        </div>
      </nav>
    </div>
  </body>
</html>
