<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog - 운동/식단 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            padding-bottom: 160px; /* 하단 고정 영역을 위한 여백 */
        }
        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background-color: #e2e8f0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }
        .action-buttons-fixed {
            position: fixed;
            bottom: 85px;
            left: 0;
            right: 0;
            z-index: 40;
        }
    </style>
</head>
<body>

    <!-- 상단 헤더 -->
    <header class="p-5 flex justify-between items-center bg-white sticky top-0 z-30 shadow-sm">
        <h1 class="text-xl font-bold text-slate-800">FitLog</h1>
        <div class="flex gap-4">
            <i class="fa-regular fa-bell text-xl text-slate-600"></i>
            <i class="fa-regular fa-calendar text-xl text-slate-600"></i>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 오늘 기록 요약 -->
        <section class="bg-indigo-600 rounded-2xl p-5 text-white shadow-lg">
            <h2 class="text-sm font-medium opacity-80 mb-2">오늘 기록</h2>
            <div class="flex items-center gap-2">
                <span class="bg-white/20 px-3 py-1 rounded-full text-xs">식단 3회</span>
                <span class="bg-white/20 px-3 py-1 rounded-full text-xs">운동 완료</span>
                <span class="bg-white/20 px-3 py-1 rounded-full text-xs">체중 기록</span>
            </div>
        </section>

        <!-- 오늘 요약 (카드형) -->
        <section class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-800">오늘 요약</h2>
                <span class="text-xs text-slate-400">4월 4일 (토)</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-xs text-slate-500 mb-1">칼로리</p>
                    <p class="font-bold text-slate-800">1,820 <span class="text-xs font-normal text-slate-400">/ 2,300 kcal</span></p>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-xs text-slate-500 mb-1">단백질</p>
                    <p class="font-bold text-slate-800">128 <span class="text-xs font-normal text-slate-400">/ 160g</span></p>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-xs text-slate-500 mb-1">운동</p>
                    <p class="font-bold text-green-600 flex items-center gap-1">
                        <i class="fa-solid fa-circle-check"></i> 완료
                    </p>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-xs text-slate-500 mb-1">체중</p>
                    <p class="font-bold text-slate-800">71.2 <span class="text-xs font-normal text-slate-400">kg</span></p>
                </div>
            </div>
        </section>

        <!-- 오늘 식단 진행 현황 -->
        <section class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
            <h2 class="font-bold text-slate-800 text-sm">오늘 식단 진행 현황</h2>
            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-600 font-medium">칼로리</span>
                        <span class="text-slate-400">79%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill bg-orange-400" style="width: 79%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-600 font-medium">탄수화물</span>
                        <span class="text-slate-400">72%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill bg-blue-400" style="width: 72%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-600 font-medium">단백질</span>
                        <span class="text-slate-400">80%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill bg-indigo-400" style="width: 80%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-600 font-medium">지방</span>
                        <span class="text-slate-400">61%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill bg-yellow-400" style="width: 61%"></div></div>
                </div>
            </div>
        </section>

        <!-- 오늘 운동 -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-indigo-500">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="font-bold text-slate-800">오늘 운동</h2>
                    <p class="text-sm text-slate-500">오늘의 루틴: 가슴 + 삼두</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-400">진행률</p>
                    <p class="text-sm font-bold text-indigo-600">3/5 완료</p>
                </div>
            </div>
            <div class="flex items-center gap-4 text-sm text-slate-600 mb-4">
                <div class="flex items-center gap-1">
                    <i class="fa-regular fa-clock"></i> 48분
                </div>
                <div class="flex items-center gap-1 text-orange-500">
                    <i class="fa-solid fa-fire"></i> 342 kcal
                </div>
            </div>
            <button class="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold text-sm hover:bg-indigo-100 transition-colors">
                이어서 기록하기
            </button>
        </section>

        <!-- 이번 주 요약 -->
        <section class="bg-white rounded-2xl p-5 shadow-sm">
            <h2 class="font-bold text-slate-800 mb-4 text-sm">이번 주 요약</h2>
            <div class="grid grid-cols-2 gap-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                        <i class="fa-solid fa-dumbbell text-xs"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 leading-none">운동</p>
                        <p class="text-sm font-bold">4회</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
                        <i class="fa-solid fa-utensils text-xs"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 leading-none">평균 칼로리</p>
                        <p class="text-sm font-bold">2,180 kcal</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
                        <i class="fa-solid fa-chart-line text-xs"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 leading-none">체중 변화</p>
                        <p class="text-sm font-bold text-red-500">+0.3kg</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600">
                        <i class="fa-solid fa-fire-glow text-xs"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 leading-none">연속 기록</p>
                        <p class="text-sm font-bold">6일 연속</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 하단 액션 버튼 (고정 영역) -->
    <div class="action-buttons-fixed px-6 max-w-md mx-auto">
        <div class="flex gap-3">
            <button class="flex-1 bg-white border border-orange-100 shadow-xl py-3.5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i class="fa-solid fa-utensils text-orange-500 text-sm"></i>
                <span class="text-sm font-bold text-slate-700">식단기록</span>
            </button>
            <button class="flex-1 bg-white border border-indigo-100 shadow-xl py-3.5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i class="fa-solid fa-dumbbell text-indigo-500 text-sm"></i>
                <span class="text-sm font-bold text-slate-700">운동기록</span>
            </button>
        </div>
    </div>

    <!-- 하단 탭바 -->
    <nav class="bottom-nav-fixed bg-white border-t border-slate-100 h-[75px] flex items-center justify-around px-2 max-w-md mx-auto shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <button class="flex flex-col items-center gap-1.5 text-indigo-600">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] font-bold">홈</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-500">
            <i class="fa-solid fa-list-check text-lg"></i>
            <span class="text-[10px] font-medium">루틴</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-500">
            <i class="fa-solid fa-chart-simple text-lg"></i>
            <span class="text-[10px] font-medium">통계</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-500">
            <i class="fa-solid fa-user text-lg"></i>
            <span class="text-[10px] font-medium">마이</span>
        </button>
    </nav>

</body>
</html>
